<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkOS — Login</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #07080d;
            --surface: #0d0e17;
            --surface2: #111320;
            --border: #1c1e2e;
            --border2: #222438;
            --accent: #00e5a0;
            --accent-dim: rgba(0, 229, 160, 0.08);
            --blue: #3d7eff;
            --error: #ff4466;
            --text: #dde1f0;
            --text2: #8a8fa8;
            --text3: #4a4e65;
            --mono: 'DM Mono', monospace;
            --sans: 'DM Sans', sans-serif;
            --radius: 10px;
            --radius-sm: 7px
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative
        }

        /* grid bg */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 229, 160, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 160, 0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none
        }

        /* orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            animation: drift 9s ease-in-out infinite alternate
        }

        .orb1 {
            width: 480px;
            height: 480px;
            background: rgba(0, 229, 160, 0.06);
            top: -140px;
            left: -140px
        }

        .orb2 {
            width: 360px;
            height: 360px;
            background: rgba(61, 126, 255, 0.05);
            bottom: -80px;
            right: -80px;
            animation-delay: -4.5s
        }

        @keyframes drift {
            from {
                transform: translate(0, 0)
            }

            to {
                transform: translate(28px, 18px)
            }
        }

        /* wrap */
        .login-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            animation: fadeUp 0.5s ease both
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* brand */
        .brand {
            text-align: center;
            margin-bottom: 36px
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px
        }

        .brand-icon {
            width: 38px;
            height: 38px;
            background: var(--accent);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #07080d;
            font-weight: 700
        }

        .brand-name {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text)
        }

        .brand-name em {
            color: var(--accent);
            font-style: normal
        }

        .brand-sub {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--text3);
            letter-spacing: 2.5px;
            text-transform: uppercase
        }

        /* card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            position: relative;
            overflow: hidden
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--blue), transparent)
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
            letter-spacing: -0.2px
        }

        .card-sub {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text3);
            margin-bottom: 26px;
            letter-spacing: 0.5px
        }

        /* fields */
        .field {
            margin-bottom: 16px
        }

        label {
            display: block;
            font-family: var(--mono);
            font-size: 9px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 12px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.08)
        }

        input::placeholder {
            color: var(--text3)
        }

        /* btn */
        .btn {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: #07080d;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.15s, transform 0.1s;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px
        }

        .btn:hover {
            opacity: 0.88
        }

        .btn:active {
            transform: scale(0.99)
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed
        }

        /* error */
        .error-msg {
            background: rgba(255, 68, 102, 0.06);
            border: 1px solid rgba(255, 68, 102, 0.2);
            color: var(--error);
            border-radius: var(--radius-sm);
            padding: 10px 13px;
            font-family: var(--mono);
            font-size: 11px;
            margin-top: 14px;
            display: none;
            line-height: 1.7
        }

        .error-msg.show {
            display: block
        }

        /* footer */
        .footer-note {
            text-align: center;
            margin-top: 22px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text3)
        }

        .footer-note a {
            color: var(--accent);
            text-decoration: none
        }

        .footer-note a:hover {
            text-decoration: underline
        }

        /* spinner */
        .spinner {
            display: none;
            width: 13px;
            height: 13px;
            border: 2px solid rgba(0, 0, 0, 0.25);
            border-top-color: #07080d;
            border-radius: 50%;
            animation: spin 0.55s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
    </style>
</head>

<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="login-wrap">
        <div class="brand">
            <div class="brand-logo">
                <div class="brand-icon">🅿</div>
                <div class="brand-name">Park<em>OS</em></div>
            </div>
            <div class="brand-sub">Vehicle Management System</div>
        </div>

        <div class="card">
            <div class="card-title">Sign in</div>
            <div class="card-sub">Enter your credentials to continue</div>

            <div class="field">
                <label>Username</label>
                <input type="text" id="username" placeholder="enter username" autocomplete="username">
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button class="btn" id="loginBtn" onclick="doLogin()">
                <span class="spinner" id="spinner"></span>
                Sign In
            </button>

            <div class="error-msg" id="errorMsg"></div>
        </div>

        <div class="footer-note">
            ParkOS v1.0 &nbsp;·&nbsp; <a href="register.html">Create account</a>
        </div>
    </div>

    <script>
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });

        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('spinner');
            const errorMsg = document.getElementById('errorMsg');

            if (!username || !password) {
                showError('Username and password are required');
                return;
            }

            btn.disabled = true;
            spinner.style.display = 'inline-block';
            errorMsg.classList.remove('show');

            try {
                const res = await fetch('login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });

                const data = await res.json();

                if (res.ok && data.status === 'success') {
                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    showError(data.message || 'Invalid credentials');
                }
            } catch (err) {
                showError('Connection error. Is the server running?');
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
        }
    </script>
</body>

</html>
